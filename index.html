<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BORDIQ | Defend. Detect. Dominate.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { background: #0A0A0F; color: #E5E5E5; font-family: 'Inter', sans-serif; min-height: 100vh; }
      h1,h2,h3,h4,h5,h6 { font-family: 'Space Grotesk', sans-serif; }
      code, pre, .mono { font-family: 'JetBrains Mono', monospace; }
      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: inherit; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0A0A0F; }
      ::-webkit-scrollbar-thumb { background: #1A1A2A; border-radius: 2px; }
      
      .grid-bg {
        background-image: 
          linear-gradient(rgba(229,62,62,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(229,62,62,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 8px rgba(229,62,62,0.3); } 50% { box-shadow: 0 0 20px rgba(229,62,62,0.6); } }
      @keyframes slide-in { from { transform: translateY(-100%); } to { transform: translateY(0); } }
      @keyframes count-up { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      
      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
        .show-mobile { display: flex !important; }
        .hero-grid { grid-template-columns: 1fr !important; }
        .products-grid { grid-template-columns: 1fr !important; }
        .footer-grid { grid-template-columns: 1fr 1fr !important; }
        .stats-grid { grid-template-columns: 1fr 1fr !important; }
        .infra-grid { grid-template-columns: 1fr 1fr !important; }
        .pricing-grid { grid-template-columns: 1fr !important; }
        h1.hero-title { font-size: 3rem !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
